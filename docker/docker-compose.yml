version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: codedialect_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codedialect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codedialect_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: codedialect_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Database=codedialect;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
    ports:
      - "5187:8080"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
