services:
  db:
    image: postgres:15-alpine
    container_name: codedialect_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codedialect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codedialect_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
